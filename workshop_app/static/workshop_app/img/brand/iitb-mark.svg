<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" role="img" aria-labelledby="iitTitle iitDesc">
  <title id="iitTitle">IIT Bombay logo mark</title>
  <desc id="iitDesc">IIT Bombay text mark with circular crest placeholder</desc>
  <rect x="2" y="2" width="236" height="60" rx="12" fill="#FFFFFF" stroke="#003366" stroke-width="2"/>
  <g transform="translate(14 12)">
    <circle cx="20" cy="20" r="18" fill="#003366"/>
    <circle cx="20" cy="20" r="11" fill="#FFFFFF"/>
    <circle cx="20" cy="20" r="4" fill="#FF6B00"/>
  </g>
  <text x="60" y="30" font-family="Poppins, Inter, sans-serif" font-size="18" font-weight="700" fill="#003366">IIT Bombay</text>
  <text x="60" y="46" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#FF6B00" letter-spacing="0.06em">WORKSHOP PORTAL</text>
</svg>
