{% extends "workshop_app/base.html" %}
{% load static %}

{% block title %} Forgot Password {% endblock %}

{% block page_styles %}
<link rel="stylesheet" href="{% static 'workshop_app/css/password.css' %}" type="text/css"/>
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">F</div>
        <div class="auth-success-icon"><i class="fa fa-check" aria-hidden="true"></i></div>
        <h1 class="auth-title">Password changed!</h1>
        <p class="auth-subtitle">Your password has been reset successfully.</p>
        <a href="{% url 'workshop_app:login' %}" class="auth-btn">Login Now</a>
    </div>
</div>
{% endblock %}
