{% extends "workshop_app/base.html" %}
{% load static %}

{% block page_styles %}
<link rel="stylesheet" href="{% static 'workshop_app/css/password.css' %}" type="text/css"/>
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">F</div>
        <div class="auth-success-icon"><i class="fa fa-check" aria-hidden="true"></i></div>
        <h1 class="auth-title">Password Updated</h1>
        <p class="auth-subtitle">Your password has been changed successfully.</p>
        <a class="auth-btn" href="{% url 'workshop_app:index' %}">Back to Dashboard</a>
    </div>
</div>
<script type="text/javascript">
    window.setTimeout(function () {
        location.href = "{% url 'workshop_app:index' %}";
    }, 2000);
</script>
{% endblock %}
